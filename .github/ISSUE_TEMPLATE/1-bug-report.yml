name: 🐛 Bug Report
description: Report a bug to help us improve Bokuchi
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        **Security issues must be reported via [Security Advisory](https://github.com/Bokuchi-Editor/bokuchi/security/advisories/new), not here.**
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Where it happens
      description: Which part of the app is affected?
      options:
        - Editor
        - Preview
        - Tabs
        - Settings
        - File operations
        - Export
        - Marp mode
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open '...'
        2. Click on '...'
        3. Type '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS: (e.g. macOS 15.5, Windows 11)
        - Bokuchi version: (e.g. 0.14.0)
    validations:
      required: true
  - type: checkboxes
    id: uiux
    attributes:
      label: UI/UX
      options:
        - label: This bug involves UI/UX (visual design, layout, usability)
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or logs to help explain the problem.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem.
