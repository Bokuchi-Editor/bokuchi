version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    # Supply-chain hardening: only update to releases at least 3 days old
    # (cooldown — avoids pulling a malicious release that gets yanked soon after).
    cooldown:
      default-days: 3
    open-pull-requests-limit: 10
    reviewers:
      - "shinya"
    assignees:
      - "shinya"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    # 相互依存するパッケージ群をまとめて1つのPRに集約し、
    # バージョン不整合によるCI失敗を防ぐ
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      mui:
        patterns:
          - "@mui/*"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      testing-library:
        patterns:
          - "@testing-library/*"
      tauri:
        patterns:
          - "@tauri-apps/*"
    ignore:
      # メジャーバージョンアップは手動で確認
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # KaTeX 0.17.0 で \tilde 等のアクセント×\mathbf が htmlBuilder TypeError でクラッシュ（#354）。
      # 修正版が出るまで 0.16 系に固定（0.x のため 0.16→0.17 は dependabot 上 minor 扱い）。
      - dependency-name: "katex"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]

  # Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    # Supply-chain hardening: only update to releases at least 3 days old
    # (cooldown — avoids pulling a malicious release that gets yanked soon after).
    cooldown:
      default-days: 3
    open-pull-requests-limit: 10
    reviewers:
      - "shinya"
    assignees:
      - "shinya"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "cargo"
    ignore:
      # メジャーバージョンアップは手動で確認
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Tauri関連の依存関係は慎重に更新
      - dependency-name: "tauri"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tauri-plugin-*"
        update-types: ["version-update:semver-major"]
      # glibはTauriの制約により更新できない（Tauri更新時に再検討）
      - dependency-name: "glib"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    # Supply-chain hardening: only update to releases at least 3 days old
    # (cooldown — avoids pulling a malicious release that gets yanked soon after).
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5
    reviewers:
      - "shinya"
    assignees:
      - "shinya"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"